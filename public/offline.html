<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>You're offline — SuperTech</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f1f1f2;
        color: #313133;
      }
      img { width: 84px; height: 84px; border-radius: 20px; }
      h1 { font-size: 1.4rem; margin: 0; }
      p { margin: 0; color: #6b6b6f; max-width: 28rem; line-height: 1.6; }
      button {
        margin-top: 0.5rem;
        border: 0;
        border-radius: 999px;
        background: #f68b1e;
        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.75rem 1.5rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/icons/icon-192.png" alt="SuperTech" />
    <h1>You're offline</h1>
    <p>We can't reach SuperTech right now. Check your connection and try again — your cart and account are safe.</p>
    <button onclick="location.reload()">Retry</button>
  </body>
</html>
