<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>SuperTech</title>
    <style>
      :root { color-scheme: light; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f1f1f2;
        color: #313133;
      }
      .logo { width: 96px; height: 96px; border-radius: 24px; }
      h1 { margin: 0; font-size: 1.4rem; }
      p { margin: 0; max-width: 26rem; line-height: 1.6; color: #6b6b6f; }
      button {
        border: 0; border-radius: 999px; background: #f68b1e; color: #fff;
        font-weight: 700; font-size: 0.95rem; padding: 0.8rem 1.6rem; cursor: pointer;
      }
      .spinner {
        width: 28px; height: 28px; border-radius: 50%;
        border: 3px solid rgba(246,139,30,0.25); border-top-color: #f68b1e;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!--
      This file is the offline fallback only. At runtime Capacitor loads the
      live site configured in capacitor.config.ts (server.url). If you ever
      want to bundle the site instead of loading it remotely, replace this
      folder's contents with an exported build and remove server.url.
    -->
    <img class="logo" src="icon.png" alt="SuperTech" onerror="this.style.display='none'" />
    <div class="spinner" id="spinner"></div>
    <h1>SuperTech</h1>
    <p id="msg">Loading the marketplace…</p>
    <button id="retry" style="display:none" onclick="location.reload()">Retry</button>
    <script>
      // If the live site doesn't take over within a few seconds, show retry.
      setTimeout(function () {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").textContent =
          "We couldn't reach SuperTech. Check your connection and try again.";
        document.getElementById("retry").style.display = "inline-block";
      }, 6000);
    </script>
  </body>
</html>
