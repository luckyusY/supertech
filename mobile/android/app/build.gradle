apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

def signingProps = new Properties()
def signingPropsFile = rootProject.file('signing.properties')
if (signingPropsFile.exists()) {
    signingPropsFile.withInputStream { signingProps.load(it) }
}

def releaseStoreFile = signingProps['storeFile'] ?: System.getenv('SUPERTECH_ANDROID_KEYSTORE')
def releaseStorePassword = signingProps['storePassword'] ?: System.getenv('SUPERTECH_ANDROID_STORE_PASSWORD')
def releaseKeyAlias = signingProps['keyAlias'] ?: System.getenv('SUPERTECH_ANDROID_KEY_ALIAS')
def releaseKeyPassword = signingProps['keyPassword'] ?: System.getenv('SUPERTECH_ANDROID_KEY_PASSWORD')
// Web OAuth client ID (same as Vercel GOOGLE_WEB_CLIENT_ID). Public by design.
// Override with -PSUPERTECH_GOOGLE_WEB_CLIENT_ID=... or env if you rotate credentials.
def googleWebClientIdDefault = '206659519298-b33icrcm3dmdpscljuemg9hib6p6ui9c.apps.googleusercontent.com'
def googleWebClientId = (project.findProperty('SUPERTECH_GOOGLE_WEB_CLIENT_ID')
        ?: System.getenv('SUPERTECH_GOOGLE_WEB_CLIENT_ID')
        ?: googleWebClientIdDefault).toString().trim()

android {
    namespace "africa.supertech.marketplace"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "africa.supertech.marketplace"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 33
        versionName "2.4.5"
        buildConfigField "String", "GOOGLE_WEB_CLIENT_ID", "\"${googleWebClientId}\""
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile rootProject.file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            if (releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        buildConfig true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.credentials:credentials:1.5.0"
    implementation "androidx.credentials:credentials-play-services-auth:1.5.0"
    implementation "com.google.android.libraries.identity.googleid:googleid:1.1.1"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.8.7"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
