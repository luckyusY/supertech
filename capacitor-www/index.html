<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SuperTech</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #102019;
        color: #ffffff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        display: flex;
        min-height: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: -0.03em;
      }
      p {
        margin: 0;
        max-width: 18rem;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.72);
      }
      button {
        margin-top: 0.5rem;
        border: 0;
        border-radius: 0.75rem;
        background: #f68b1e;
        color: #fff;
        font-weight: 800;
        padding: 0.85rem 1.5rem;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <!--
      Offline fallback shown only when the live site is unreachable.
      The native app normally loads https://www.supertech.africa/app
      (configured in capacitor.config.ts > server.url).
    -->
    <div class="wrap">
      <h1>SuperTech</h1>
      <p>You're offline. Reconnect to keep shopping verified vendors across Africa.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
